; ════════════════════════════════════════════════════════════════
; Generic OBD-II — 通用车辆 (自动识别/手动后备)
; 适用于所有支持 OBD-II Mode 01 的车辆
; 仅包含标准 SAE J1979 PID, 不包含车辆特定参数
; ════════════════════════════════════════════════════════════════

[vehicle]
name = Generic OBD-II (Universal)
platform = AUTO
engine = AUTO
transmission = AUTO
protocol = OBD-II
year_from = 2008
year_to = 2030
; ★ vin_pattern 为空 → 匹配任何车辆 (万能后备)
vin_pattern =

[can]
stp_protocol = 33
elm_protocol = 6
id_bits = 11
bitrate = 500000

[ecu_list]
ecu_1 = 7DF, 7E8, ECM (Engine Control Module)

[timing]
stpto = 50
stctor_fc = 50
stctor_cf = 100
stptrq = 0
elm_timeout = 32
stpx_cmd_timeout = 150
dyndid_read_timeout = 50

[flow_control]
fc_data = 300000
fc_mode = 1

[session]
; OBD-II 无需诊断会话
preferred =
fallback =
heartbeat_interval = 0
heartbeat_cmd =

[dynamic_did]
; OBD-II 不支持动态 DID
enabled = false
target_did = F300

; ═══ OBD-II Mode 01 标准 PID (所有车辆通用) ═══
; 格式: id, obd2Pid, ecu_tx, ecu_rx, parse, offset, scale, bias, unit, group, decimals, gauge_max, normal_max, short_name, full_name

[dids]
; ── 基础发动机 ──
; 010C RPM: (A*256+B)/4
uds_rpm = 0C, 7DF, 7E8, u16, 0, 0.25, 0, rpm, engine, 0, 8000, 7000, RPM, 发动机转速
; 010D Speed: A (km/h)
uds_speed = 0D, 7DF, 7E8, u8, 0, 1.0, 0, km/h, engine, 1, 300, 250, 车速, 车辆速度
; 0111 Throttle: A*100/255
uds_accel = 11, 7DF, 7E8, u8, 0, 0.39215686, 0, %, engine, 1, 100, 100, 节气门, 节气门位置
; 0104 Load: A*100/255
uds_load = 04, 7DF, 7E8, u8, 0, 0.39215686, 0, %, engine, 1, 100, 100, 负荷, 发动机负荷
; 扭矩 (OBD-II标准无扭矩PID, 从负荷+转速估算)
uds_torque = 04, 7DF, 7E8, u8, 0, 2.5, -50, Nm, engine, 1, 500, 400, 扭矩, 扭矩(估算)

; ── 温度 ──
; 0105 Coolant: A-40
uds_coolant = 05, 7DF, 7E8, u8, 0, 1.0, -40, °C, engine, 1, 140, 105, 水温, 冷却液温度
; 010F IAT: A-40
uds_iat_b1 = 0F, 7DF, 7E8, u8, 0, 1.0, -40, °C, air, 1, 120, 60, 进气温度, 进气温度

; ── 增压/压力 ──
; 010B MAP: A (kPa 绝对压力)
uds_boost_b1 = 0B, 7DF, 7E8, u8, 0, 1.0, 0, kPa, boost, 1, 300, 255, MAP, 歧管绝对压力

; ── 点火 ──
; 010E Timing: A/2-64
uds_ign_b1 = 0E, 7DF, 7E8, u8, 0, 0.5, -64, °, timing, 1, 50, 50, 点火, 点火提前角

; ── 退点火 (OBD-II无直接PID — 显示0) ──
uds_kr_avg = 0E, 7DF, 7E8, u8, 0, 0.0, 0, °, knock, 1, 15, 15, 退点火, 退点火N/A

; ── 燃油 ──
; 012F Fuel Level: A*100/255
uds_fuel_lp = 2F, 7DF, 7E8, u8, 0, 0.39215686, 0, %, fuel, 1, 100, 100, 油位, 燃油液位

; ── 空燃比 ──
; 0144 AFR: (A*256+B)*0.0000305 (标准OBD-II lambda)
uds_lambda_b1 = 44, 7DF, 7E8, u16, 0, 0.0000305, 0, AFR, lambda, 2, 22, 22, AFR, 空燃比

; ── 环境 ──
; 0146 Ambient Temp: A-40
uds_ambient = 46, 7DF, 7E8, u8, 0, 1.0, -40, °C, air, 1, 60, 60, 环境温度, 环境温度

; ═══ 齿轮比 (通用: Mercedes C63s W205 默认 — 非精确, 用于档位推算) ═══
[gear_ratios]
gear_1 = 4.380
gear_2 = 2.860
gear_3 = 1.920
gear_4 = 1.370
gear_5 = 1.000
gear_6 = 0.820
gear_7 = 0.730
final_drive = 2.820

; ═══ 轮胎 (通用默认) ═══
[tire]
width = 285
aspect = 30
rim = 19

; ═══ RPM 配置 ═══
[rpm]
max = 7000
shift = 6500
full_throttle_threshold = 80

; ═══ 慢变化参数 (低频轮询) ═══
[slow_change_pids]
pids = uds_iat_b1, uds_ambient, uds_lambda_b1, uds_fuel_lp
interval = 5
