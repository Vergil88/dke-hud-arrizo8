; ════════════════════════════════════════════════════════════════
; Arrizo 8 2.0T (2024款 劲) — OBD-II Mode 01
; 车型: 奇瑞艾瑞泽8 SQR7200M1ETB
; 发动机: SQRF4J20 2.0T (1998cc, 187kW/390N·m)
; 变速箱: 7速湿式双离合 (7DCT300)
; 协议: ISO 15765-4 CAN 11-bit 500kbps
; 适配器: vLinker MS / ELM327 兼容
; ════════════════════════════════════════════════════════════════

[vehicle]
name = Arrizo 8 2.0T (2024)
platform = M1E
engine = SQRF4J20 2.0T
transmission = 7DCT300
protocol = OBD-II
year_from = 2024
year_to = 2025
; ★ VIN 前缀匹配: LVVDC24B = Arrizo 8 2.0T (Chery SQR7200M1ETB)
;    连接OBD-II时自动校验, 防止误配其他车辆
vin_pattern = LVVDC24B

[can]
stp_protocol = 33
elm_protocol = 6
id_bits = 11
bitrate = 500000

[ecu_list]
ecu_1 = 7DF, 7E8, ECM (Engine Control Module)

[timing]
stpto = 50
stctor_fc = 50
stctor_cf = 100
stptrq = 0
elm_timeout = 32
stpx_cmd_timeout = 150
dyndid_read_timeout = 50

[flow_control]
fc_data = 300000
fc_mode = 1

[session]
; OBD-II 无需诊断会话
preferred =
fallback =
heartbeat_interval = 0
heartbeat_cmd =

[dynamic_did]
; OBD-II 不支持动态 DID
enabled = false
target_did = F300

; ═══ OBD-II Mode 01 PID 定义 ═══
; 格式: did, ecu_tx, ecu_rx, parse, offset, scale, bias, unit, group, decimals, gauge_max, normal_max, short_name, full_name
; 注: did 字段在此作为标识符使用, 实际请求用 obd2Pid 字段
;     parse: u8=uint8, u16=uint16be, i8=int8, i16=int16be

[dids]
; ── 基础发动机 ──
; 010C RPM: (A*256+B)/4
uds_rpm = 0C, 7DF, 7E8, u16, 0, 0.25, 0, rpm, engine, 0, 8000, 7000, RPM, 发动机转速
; 010D Speed: A (km/h)
uds_speed = 0D, 7DF, 7E8, u8, 0, 1.0, 0, km/h, engine, 1, 300, 250, 车速, 车辆速度
; 0111 Throttle: A*100/255
uds_accel = 11, 7DF, 7E8, u8, 0, 0.39215686, 0, %, engine, 1, 100, 100, 节气门, 节气门位置
; 0104 Load: A*100/255
uds_load = 04, 7DF, 7E8, u8, 0, 0.39215686, 0, %, engine, 1, 100, 100, 负荷, 发动机负荷
; 扭矩 (从负荷估算)
uds_torque = 04, 7DF, 7E8, u8, 0, 3.0, -60, Nm, engine, 1, 500, 400, 扭矩, 发动机扭矩估算

; ── 温度 ──
; 0105 Coolant: A-40
uds_coolant = 05, 7DF, 7E8, u8, 0, 1.0, -40, °C, engine, 1, 140, 105, 水温, 冷却液温度
; 010F IAT: A-40
uds_iat_b1 = 0F, 7DF, 7E8, u8, 0, 1.0, -40, °C, air, 1, 120, 60, 进气温度, 进气温度

; ── 增压/压力 ──
; 010B MAP: A (kPa 绝对压力)
uds_boost_b1 = 0B, 7DF, 7E8, u8, 0, 1.0, 0, kPa, boost, 1, 300, 255, MAP, 歧管绝对压力

; ── 点火 ──
; 010E Timing: A/2-64
uds_ign_b1 = 0E, 7DF, 7E8, u8, 0, 0.5, -64, °, timing, 1, 50, 50, 点火, 点火提前角

; ── 退点火 (OBD-II无直接PID) ──
uds_kr_avg = 0E, 7DF, 7E8, u8, 0, 0.0, 0, °, knock, 1, 15, 15, 退点火, 退点火N/A

; ── 燃油 ──
; 012F Fuel Level: A*100/255
uds_fuel_lp = 2F, 7DF, 7E8, u8, 0, 0.39215686, 0, %, fuel, 1, 100, 100, 油位, 燃油液位

; ── 空燃比 ──
; 0144 AFR: (A*256+B)*0.0000305
uds_lambda_b1 = 44, 7DF, 7E8, u16, 0, 0.0000305, 0, AFR, lambda, 2, 22, 22, AFR, 空燃比

; ── 环境 ──
; 0146 Ambient Temp: A-40
uds_ambient = 46, 7DF, 7E8, u8, 0, 1.0, -40, °C, air, 1, 60, 60, 环境温度, 环境温度

; ═══ 齿轮比 (艾瑞泽8 7DCT300) ═══
[gear_ratios]
gear_1 = 4.308
gear_2 = 2.684
gear_3 = 1.594
gear_4 = 1.114
gear_5 = 0.894
gear_6 = 0.829
gear_7 = 0.638
; 主传动比 3.944 (1/2/6/7档) / 4.438 (3/4/5档)
final_drive = 3.944

; ═══ 轮胎 ═══
[tire]
width = 225
aspect = 45
rim = 18

; ═══ RPM 配置 ═══
[rpm]
max = 7000
shift = 6500
full_throttle_threshold = 80

; ═══ 慢变化参数 (低频轮询) ═══
[slow_change_pids]
pids = uds_iat_b1, uds_ambient, uds_lambda_b1, uds_fuel_lp
interval = 5

; ═══ HUD 默认通道配置 ═══
; 格式: pidId, gaugeMax, cautionHigh, dangerHigh, cautionLow, dangerLow, warnDir, alertStyle, alertSfx, titleJp, titleEn
[hud_defaults]
slot_0 = uds_boost_b1, 300, 200, 250, 0, 0, high, overboost, boost_warn, 増圧限界, OVERBOOST
slot_1 = uds_torque, 500, 350, 420, 0, 0, high, generic, none, 負荷限界, TORQUE LIMIT
slot_2 = uds_coolant, 140, 105, 115, 0, 0, high, overheat, temp_warn, 冷却過熱, OVERHEAT
slot_3 = uds_accel, 100, 85, 95, 0, 0, high, generic, none, 全開, FULL THROTTLE
slot_4 = uds_ign_b1, 50, 35, 40, -10, -20, both, generic, none, 点火異常, TIMING
slot_5 = uds_rpm, 8000, 6500, 7000, 0, 0, high, emergency, shift_warn, 回転限界, REDLINE
