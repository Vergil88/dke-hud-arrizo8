; ════════════════════════════════════════════════════════════════
; Arrizo 8 2.0T (2024) — UDS Service 0x22
; 车型: 奇瑞艾瑞泽8 SQR7200M1ETB
; 发动机: SQRF4J20 2.0T (187kW/390N·m)
; 协议: UDS ISO 14229 — 实车 DID 扫描确认
; ════════════════════════════════════════════════════════════════

[vehicle]
name = Arrizo 8 2.0T (UDS)
platform = M1E
engine = SQRF4J20 2.0T
transmission = 7DCT300
protocol = UDS
year_from = 2024
year_to = 2025
; ★ VIN 前缀匹配: LVVDC24B = Arrizo 8 2.0T (Chery SQR7200M1ETB)
vin_pattern = LVVDC24B

[can]
stp_protocol = 33
elm_protocol = 6
id_bits = 11
bitrate = 500000

[ecu_list]
ecu_1 = 7E0, 7E8, ECM (Engine Control Module)

[timing]
stpto = 50
stctor_fc = 50
stctor_cf = 100
stptrq = 0
elm_timeout = 32
stpx_cmd_timeout = 150
dyndid_read_timeout = 50

[flow_control]
fc_data = 300000
fc_mode = 1

[session]
preferred = 03
fallback = 02
heartbeat_interval = 2000
heartbeat_cmd = 3E80

[dynamic_did]
enabled = true
target_did = F300

; ═══ UDS DID 定义 (实车扫描确认) ═══
; 格式: id, did, ecu_tx, ecu_rx, parse, offset, scale, bias, unit, group, decimals, gauge_max, normal_max, short_name, full_name
; parse: u8=uint8, u16=uint16be, i8=int8, i16=int16be

[dids]
; ── 发动机基础 (0x2000 区间) ──
; 0x2000 发动机转速: (raw*0.25) rpm
uds_rpm = 2000, 7E0, 7E8, u16, 0, 0.25, 0, rpm, engine, 0, 8000, 7000, RPM, 发动机转速
; 0x2001 发动机负荷: (raw*0.0234375) %
uds_load = 2001, 7E0, 7E8, u16, 0, 0.0234375, 0, %, engine, 1, 100, 100, 负荷, 发动机负荷
; 0x2004 计算负荷
uds_calc_load = 2004, 7E0, 7E8, u16, 0, 0.0234375, 0, %, engine, 1, 100, 100, 计算负荷, 计算负荷
; 0x200C RPM (备用)
uds_rpm_alt = 200C, 7E0, 7E8, u16, 0, 0.25, 0, rpm, engine, 0, 8000, 7000, RPM_ALT, 发动机转速(备用)

; ── 温度/压力 (0x2010 区间) ──
; 0x2011 冷却液温度: (raw*0.75-48) ℃
uds_coolant = 2011, 7E0, 7E8, u16, 0, 0.75, -48, °C, engine, 1, 140, 105, 水温, 冷却液温度
; 0x2014 进气温度: (raw*0.75-48) ℃
uds_iat_b1 = 2014, 7E0, 7E8, u16, 0, 0.75, -48, °C, air, 1, 120, 60, 进气温度, 进气温度B1
; 0x2018 歧管压力: (raw*0.001133) PSI
uds_manifold_b1 = 2018, 7E0, 7E8, u16, 0, 0.001133109, 0, psi, boost, 1, 44, 44, 歧管B1, 歧管压力B1

; ── 油门/节气门 (0x2020 区间) ──
; 0x2029 油门踏板: (raw*0.001526) %
uds_accel = 2029, 7E0, 7E8, u16, 0, 0.001525902, 0, %, engine, 1, 100, 100, 油门, 油门踏板位置

; ── 增压/压力 (0x2070 区间) ──
; 0x2071 高压轨压: (raw*0.0005) MPa
uds_fuel_hp = 2071, 7E0, 7E8, u16, 0, 0.0005, 0, MPa, fuel, 2, 25, 20, 高压油, 高压轨压B1
; 0x2077 增压压力: (raw*0.001133) PSI
uds_boost_b1 = 2077, 7E0, 7E8, u16, 0, 0.001133109, 0, psi, boost, 1, 44, 29, 增压B1, 增压压力B1
; 0x2079 空滤后压力: (raw*0.0390625) hPa
uds_airfilter = 2079, 7E0, 7E8, u16, 0, 0.0390625, 0, hPa, air, 1, 1100, 1100, 空滤B1, 空滤后压力B1

; ── 燃油系统 (0x2090 区间) ──
; 0x2098 低压燃油压力: (raw*0.1) kPa
uds_fuel_lp = 2098, 7E0, 7E8, u16, 0, 0.1, 0, kPa, fuel, 1, 800, 800, 低压油, 低压燃油压力

; ═══ 齿轮比 (艾瑞泽8 7DCT300) ═══
[gear_ratios]
gear_1 = 4.308
gear_2 = 2.684
gear_3 = 1.594
gear_4 = 1.114
gear_5 = 0.894
gear_6 = 0.829
gear_7 = 0.638
final_drive = 3.944

; ═══ 轮胎 ═══
[tire]
width = 225
aspect = 45
rim = 18

; ═══ RPM 配置 ═══
[rpm]
max = 7000
shift = 6500
full_throttle_threshold = 80

; ═══ 慢变化参数 ═══
[slow_change_pids]
pids = uds_iat_b1, uds_ambient, uds_airfilter, uds_fuel_lp, uds_fuel_hp, uds_lambda_b1
interval = 3

; ═══ HUD 默认通道 ═══
[hud_defaults]
slot_0 = uds_boost_b1, 44, 32, 38, 0, 0, high, overboost, boost_warn, 増圧限界, OVERBOOST
slot_1 = uds_torque, 900, 500, 700, 0, 0, high, generic, none, トルク, TORQUE
slot_2 = uds_coolant, 140, 100, 105, 0, 0, high, overheat, temp_warn, 冷却過熱, OVERHEAT
slot_3 = uds_accel, 100, 85, 95, 0, 0, high, generic, none, スロットル, THROTTLE
slot_4 = uds_ign_b1, 50, 35, 40, -10, -20, both, generic, none, 点火時期, TIMING
slot_5 = uds_rpm, 8000, 6500, 7000, 0, 0, high, emergency, shift_warn, 回転限界, REDLINE
